name: e2e
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AI_MODE: stub
      DEMO_AUTH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:push
      - run: npm run db:seed
      - run: npm run typecheck
      - run: npm test
      - run: npm run ai:eval
      - run: npm run e2e:install
      - run: npm run e2e
